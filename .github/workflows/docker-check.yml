name: Docker Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up --build -d

      - name: Wait for healthy containers
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            unhealthy="$(docker compose ps --format json | jq -r 'if type == "array" then .[] else . end | select(.Health != "healthy") | .Service' | tr '\n' ' ')"
            if [ -z "$unhealthy" ]; then
              docker compose ps
              exit 0
            fi
            echo "Waiting for healthy services: $unhealthy"
            sleep 3
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Check nginx frontend variants
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:8080/health.html
          curl -fsS http://127.0.0.1:8081/health.html

      - name: Check PHP assignment endpoints
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:8082/ | grep -E '^Hello [0-9]{2}-[0-9]{2}-[0-9]{4}$'
          curl -fsS http://127.0.0.1:8082/php/health | jq -e '.status == "ok" and .service == "nginx-php-fpm"'
          curl -fsS http://127.0.0.1:8082/php/status | jq -e '.status == "ok" and .service == "nginx + php-fpm" and (.task_output | test("^Hello [0-9]{2}-[0-9]{2}-[0-9]{4}$"))'

      - name: Shutdown
        if: always()
        run: docker compose down --remove-orphans
